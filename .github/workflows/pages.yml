name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (workflow source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/pages -q .status 2>/dev/null || echo "not_found")
          if [ "$STATUS" = "not_found" ]; then
            echo "Enabling GitHub Pages..."
            gh api repos/${{ github.repository }}/pages -X POST -f build_type=workflow || true
          else
            echo "Pages already enabled (status: $STATUS)"
            gh api repos/${{ github.repository }}/pages -X PUT -f build_type=workflow || true
          fi

  deploy:
    needs: enable-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
